# =============================================================================
# Rhizome: Shared Local Supabase Instance Configuration
#
# This is the AUTHORITATIVE config for the shared local Supabase instance
# serving all apps in the workspace (tunetrees, cubefsrs, etc.).
#
# Run `supabase start` from the rhizome directory to start the shared instance.
#
# For LOCAL development: Each app repo uses the shared orchestration script:
#   cd rhizome && ./scripts/db-push-local.sh <app-name>
# This prevents migrations from conflicting when multiple apps push to the same
# local instance simultaneously.
#
# For REMOTE/production: Each app repo runs `supabase db push` independently
# against its own remote Supabase project (not the shared rhizome instance).
#
# App-owned schemas, migrations, and app data seeds live in each app's repo.
# Rhizome owns the shared local Supabase config plus shared auth/bootstrap
# helpers for the cross-app identity layer.
# =============================================================================

# For detailed configuration reference documentation, visit:
# https://supabase.com/docs/guides/local-development/cli/config
project_id = "rhizome"

[api]
enabled = true
# Port to use for the API URL.
port = 54321
# ACCEPTED EXCEPTION: both app schemas are listed here so PostgREST exposes
# their tables via the shared API. Schema definitions (DDL, RLS, triggers)
# live in each app's repo — only the exposure is configured here.
schemas = ["public", "graphql_public", "cubefsrs"]
# cubefsrs schema is added to search_path so its functions resolve correctly.
extra_search_path = ["public", "extensions", "cubefsrs"]
max_rows = 1000

[api.tls]
enabled = false

[db]
port = 54322
shadow_port = 54320
health_timeout = "2m"
major_version = 17

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[db.migrations]
# rhizome owns one bootstrap migration: it creates empty schema stubs for every
# app schema listed in [api] schemas above (e.g. `cubefsrs`). This ensures those
# schemas exist before PostgREST starts its health check — PostgREST fails the
# check if any configured schema is absent. The actual DDL (tables, triggers,
# RLS, seeds) for each app schema still lives exclusively in each app's repo and
# is applied after `supabase start` via `scripts/db-push-local.sh`.
enabled = true
schema_paths = []

[db.seed]
# Automatic Supabase CLI seeds stay disabled here. Shared auth bootstrap is
# applied explicitly via scripts/seed-shared-auth-users-local.sh so app repos
# keep owning only their app-scoped seeds.
enabled = false

[db.network_restrictions]
enabled = false
allowed_cidrs = ["0.0.0.0/0"]
allowed_cidrs_v6 = ["::/0"]

[realtime]
enabled = true

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"
openai_api_key = "env(OPENAI_API_KEY)"

[inbucket]
enabled = true
port = 54324
# smtp_port = 54325
# pop3_port = 54326

[storage]
enabled = true
file_size_limit = "50MiB"

[storage.s3_protocol]
enabled = true

[storage.analytics]
enabled = false
max_namespaces = 5
max_tables = 10
max_catalogs = 2

[storage.vector]
enabled = false
max_buckets = 10
max_indexes = 5

[auth]
enabled = true
# Primary site URL (tunetrees, as the first tenant). Update when tunetrees
# migrates to using rhizome as its Supabase start point.
site_url = "http://localhost:5173"
# All workspace app URLs: tunetrees (5173/4173) and cubefsrs (5174/4174).
additional_redirect_urls = [
    "http://localhost:5173",
    "http://127.0.0.1:5173",
    "http://localhost:4173",
    "http://localhost:5174",
    "http://127.0.0.1:5174",
    "http://localhost:4174"
]
# Long expiry for local dev to support time-travel tests without re-auth.
jwt_expiry = 315360000
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = true
enable_manual_linking = true
minimum_password_length = 6
password_requirements = ""

[auth.rate_limit]
email_sent = 2
sms_sent = 30
anonymous_users = 30
token_refresh = 150
sign_in_sign_ups = 30
token_verifications = 30
web3 = 30

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false
secure_password_change = false
max_frequency = "1s"
otp_length = 6
otp_expiry = 3600

[auth.sms]
enable_signup = false
enable_confirmations = false
template = "Your code is {{ .Code }}"
max_frequency = "5s"
